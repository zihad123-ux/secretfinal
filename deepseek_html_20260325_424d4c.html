<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CollabSphere | Server + Local Storage</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem;
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .navbar {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 1rem;
            padding: 1rem 2rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo i {
            color: #667eea;
            margin-right: 8px;
        }

        .server-badge {
            font-size: 0.7rem;
            background: #10b981;
            color: white;
            padding: 3px 8px;
            border-radius: 20px;
            margin-left: 10px;
        }

        .offline-badge {
            font-size: 0.7rem;
            background: #f59e0b;
            color: white;
            padding: 3px 8px;
            border-radius: 20px;
            margin-left: 10px;
        }

        .auth-buttons {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .user-badge {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 0.5rem 1.2rem;
            border-radius: 0.5rem;
            font-weight: 500;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn {
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 0.5rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid #667eea;
            color: #667eea;
        }

        .btn-outline:hover {
            background: #667eea;
            color: white;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .btn-warning {
            background: #f59e0b;
            color: white;
        }

        .btn-warning:hover {
            background: #d97706;
        }

        .btn-sm {
            padding: 0.3rem 0.8rem;
            font-size: 0.8rem;
        }

        .btn-success {
            background: #10b981;
            color: white;
        }

        .btn-success:hover {
            background: #059669;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 0.9fr;
            gap: 2rem;
        }

        .posts-section, .messages-section {
            background: white;
            border-radius: 1rem;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .section-header {
            background: #f3f4f6;
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e5e7eb;
        }

        .section-header h2 {
            font-size: 1.2rem;
            color: #333;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .badge {
            background: #667eea;
            color: white;
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .posts-container, .messages-container {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-height: 60vh;
            overflow-y: auto;
        }

        .post-card {
            background: #f9fafb;
            border-radius: 0.5rem;
            padding: 1rem;
            transition: all 0.2s;
            border: 1px solid #e5e7eb;
        }

        .post-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .post-title {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            color: #333;
        }

        .post-content {
            color: #6b7280;
            margin-bottom: 0.8rem;
            line-height: 1.4;
        }

        .post-meta {
            font-size: 0.7rem;
            color: #9ca3af;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .admin-actions {
            display: flex;
            gap: 0.5rem;
        }

        .message-card {
            background: #fef3c7;
            border-left: 3px solid #f59e0b;
            padding: 0.8rem;
            border-radius: 0.5rem;
        }

        .message-sender {
            font-weight: 700;
            color: #92400e;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 0.3rem;
        }

        .message-text {
            color: #78350f;
            margin: 0.3rem 0;
        }

        .message-time {
            font-size: 0.65rem;
            color: #b45309;
        }

        .admin-panel {
            background: white;
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            border-left: 4px solid #f59e0b;
        }

        .admin-panel h3 {
            color: #333;
            margin-bottom: 1rem;
            font-size: 1.1rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        input, textarea {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #e5e7eb;
            border-radius: 0.5rem;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .message-form {
            padding: 1rem;
            background: #f9fafb;
            border-top: 1px solid #e5e7eb;
            display: flex;
            gap: 0.8rem;
            align-items: center;
        }

        .message-form input {
            flex: 1;
            margin: 0;
        }

        .empty-state, .loading-state {
            text-align: center;
            padding: 2rem;
            color: #9ca3af;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 0.85rem;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal-content {
            background: white;
            border-radius: 1rem;
            padding: 2rem;
            max-width: 400px;
            width: 90%;
            animation: modalSlideIn 0.3s ease;
        }

        @keyframes modalSlideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-content h3 {
            margin-bottom: 1rem;
            color: #333;
        }

        .modal-content input {
            margin-bottom: 1rem;
        }

        .modal-buttons {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            margin-top: 1rem;
        }

        .demo-info {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #e5e7eb;
            font-size: 0.8rem;
            color: #6b7280;
            text-align: center;
        }

        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }
            .dashboard-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
            .navbar {
                flex-direction: column;
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="navbar">
        <div class="logo">
            <i class="fas fa-cloud-upload-alt"></i> CollabSphere 
            <span id="connectionBadge" class="server-badge"><i class="fas fa-server"></i> Server Mode</span>
        </div>
        <div class="auth-buttons" id="authArea">
            <div class="loading-state" style="padding: 0;">Loading...</div>
        </div>
    </div>

    <div id="adminPanel" class="admin-panel" style="display: none;">
        <h3><i class="fas fa-pen-alt"></i> Admin Panel - Create Post</h3>
        <div class="form-group">
            <input type="text" id="postTitle" placeholder="Post title" autocomplete="off">
        </div>
        <div class="form-group">
            <textarea id="postContent" rows="3" placeholder="Post content..."></textarea>
        </div>
        <button id="createPostBtn" class="btn btn-success"><i class="fas fa-plus-circle"></i> Publish Post</button>
    </div>

    <div class="dashboard-grid">
        <div class="posts-section">
            <div class="section-header">
                <h2><i class="fas fa-newspaper"></i> Official Posts</h2>
                <span id="postCountBadge" class="badge">0 posts</span>
            </div>
            <div id="postsContainer" class="posts-container">
                <div class="loading-state"><i class="fas fa-spinner fa-pulse"></i> Loading posts...</div>
            </div>
        </div>

        <div class="messages-section">
            <div class="section-header">
                <h2><i class="fas fa-envelope"></i> Messages to Admin</h2>
                <span id="msgCountBadge" class="badge">0 msgs</span>
            </div>
            <div id="messagesContainer" class="messages-container">
                <div class="loading-state"><i class="fas fa-spinner fa-pulse"></i> Loading messages...</div>
            </div>
            <div class="message-form">
                <input type="text" id="messageInput" placeholder="Type your message to admin..." autocomplete="off">
                <button id="sendMessageBtn" class="btn btn-primary"><i class="fas fa-paper-plane"></i> Send</button>
            </div>
        </div>
    </div>
</div>

<script>
    // ============= CONFIGURATION =============
    const SERVER_URL = 'http://localhost:3000/api';
    let useServer = false;
    let token = null;
    let currentUser = null;
    
    // Local storage fallback data
    let users = [];
    let posts = [];
    let messages = [];
    
    // ============= CHECK SERVER CONNECTION =============
    async function checkServerConnection() {
        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 3000);
            const response = await fetch(`${SERVER_URL}/posts`, {
                signal: controller.signal,
                headers: { 'Content-Type': 'application/json' }
            });
            clearTimeout(timeoutId);
            if (response.ok) {
                useServer = true;
                document.getElementById('connectionBadge').innerHTML = '<i class="fas fa-server"></i> Server Mode';
                document.getElementById('connectionBadge').className = 'server-badge';
                showToast('✅ Connected to server', '#10b981');
                return true;
            }
        } catch (error) {
            console.log('Server not available, using local storage');
        }
        useServer = false;
        document.getElementById('connectionBadge').innerHTML = '<i class="fas fa-database"></i> Local Mode';
        document.getElementById('connectionBadge').className = 'offline-badge';
        showToast('📀 Server offline - Using local storage', '#f59e0b');
        return false;
    }
    
    // ============= LOCAL STORAGE FUNCTIONS (Fallback) =============
    function loadLocalData() {
        const storedUsers = localStorage.getItem('collab_users_local');
        const storedPosts = localStorage.getItem('collab_posts_local');
        const storedMessages = localStorage.getItem('collab_messages_local');
        const storedSession = localStorage.getItem('collab_session_local');
        
        if (storedUsers) users = JSON.parse(storedUsers);
        else {
            users = [
                { id: 'u1', username: 'alex_user', password: 'user123', role: 'user' },
                { id: 'u2', username: 'admin', password: 'admin123', role: 'admin' }
            ];
            localStorage.setItem('collab_users_local', JSON.stringify(users));
        }
        
        if (storedPosts) posts = JSON.parse(storedPosts);
        else {
            posts = [
                { id: 'p1', title: 'Welcome to CollabSphere', content: 'Admins share important updates. Users can view posts and send messages!', createdAt: new Date().toISOString() },
                { id: 'p2', title: 'Platform Guidelines', content: 'Respectful communication is key. Admins will post announcements regularly.', createdAt: new Date().toISOString() }
            ];
            localStorage.setItem('collab_posts_local', JSON.stringify(posts));
        }
        
        if (storedMessages) messages = JSON.parse(storedMessages);
        else {
            messages = [];
            localStorage.setItem('collab_messages_local', JSON.stringify(messages));
        }
        
        if (storedSession) {
            currentUser = JSON.parse(storedSession);
        }
    }
    
    function saveLocalData() {
        localStorage.setItem('collab_users_local', JSON.stringify(users));
        localStorage.setItem('collab_posts_local', JSON.stringify(posts));
        localStorage.setItem('collab_messages_local', JSON.stringify(messages));
        if (currentUser) {
            localStorage.setItem('collab_session_local', JSON.stringify(currentUser));
        } else {
            localStorage.removeItem('collab_session_local');
        }
    }
    
    // ============= SERVER API FUNCTIONS =============
    async function serverCall(endpoint, options = {}) {
        if (!useServer) return null;
        
        const headers = {
            'Content-Type': 'application/json',
            ...options.headers
        };
        
        if (token) {
            headers['Authorization'] = `Bearer ${token}`;
        }
        
        try {
            const response = await fetch(`${SERVER_URL}${endpoint}`, {
                ...options,
                headers
            });
            
            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.error || 'API Error');
            }
            
            return await response.json();
        } catch (error) {
            console.log('Server error, falling back to local:', error.message);
            useServer = false;
            document.getElementById('connectionBadge').innerHTML = '<i class="fas fa-database"></i> Local Mode';
            document.getElementById('connectionBadge').className = 'offline-badge';
            return null;
        }
    }
    
    async function serverLogin(username, password) {
        const data = await serverCall('/login', {
            method: 'POST',
            body: JSON.stringify({ username, password })
        });
        if (data) {
            token = data.token;
            currentUser = data.user;
            localStorage.setItem('server_token', token);
            localStorage.setItem('server_user', JSON.stringify(currentUser));
            return true;
        }
        return false;
    }
    
    async function serverRegister(username, password) {
        const data = await serverCall('/register', {
            method: 'POST',
            body: JSON.stringify({ username, password })
        });
        if (data) {
            token = data.token;
            currentUser = data.user;
            localStorage.setItem('server_token', token);
            localStorage.setItem('server_user', JSON.stringify(currentUser));
            return true;
        }
        return false;
    }
    
    async function serverGetPosts() {
        return await serverCall('/posts');
    }
    
    async function serverCreatePost(title, content) {
        return await serverCall('/posts', {
            method: 'POST',
            body: JSON.stringify({ title, content })
        });
    }
    
    async function serverUpdatePost(id, title, content) {
        return await serverCall(`/posts/${id}`, {
            method: 'PUT',
            body: JSON.stringify({ title, content })
        });
    }
    
    async function serverDeletePost(id) {
        return await serverCall(`/posts/${id}`, { method: 'DELETE' });
    }
    
    async function serverGetMessages() {
        return await serverCall('/messages');
    }
    
    async function serverSendMessage(text) {
        return await serverCall('/messages', {
            method: 'POST',
            body: JSON.stringify({ text })
        });
    }
    
    // ============= LOCAL FUNCTIONS (Fallback) =============
    function localLogin(username, password) {
        const user = users.find(u => u.username === username && u.password === password);
        if (user) {
            currentUser = { id: user.id, username: user.username, role: user.role };
            saveLocalData();
            return true;
        }
        return false;
    }
    
    function localRegister(username, password) {
        if (users.find(u => u.username === username)) return false;
        const newUser = {
            id: 'u' + Date.now(),
            username,
            password,
            role: 'user'
        };
        users.push(newUser);
        currentUser = { id: newUser.id, username: newUser.username, role: 'user' };
        saveLocalData();
        return true;
    }
    
    function localGetPosts() {
        return [...posts].sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
    }
    
    function localCreatePost(title, content) {
        if (currentUser?.role !== 'admin') return false;
        const newPost = {
            id: 'p' + Date.now(),
            title,
            content,
            createdAt: new Date().toISOString()
        };
        posts.unshift(newPost);
        saveLocalData();
        return newPost;
    }
    
    function localUpdatePost(id, title, content) {
        const post = posts.find(p => p.id === id);
        if (post) {
            post.title = title;
            post.content = content;
            post.updatedAt = new Date().toISOString();
            saveLocalData();
            return true;
        }
        return false;
    }
    
    function localDeletePost(id) {
        posts = posts.filter(p => p.id !== id);
        saveLocalData();
        return true;
    }
    
    function localGetMessages() {
        if (currentUser?.role === 'admin') {
            return [...messages].sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
        }
        return messages.filter(m => m.userId === currentUser?.id).sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
    }
    
    function localSendMessage(text) {
        if (!currentUser) return false;
        const newMsg = {
            id: 'msg' + Date.now(),
            userId: currentUser.id,
            username: currentUser.username,
            text: text.trim(),
            timestamp: new Date().toISOString()
        };
        messages.push(newMsg);
        saveLocalData();
        return newMsg;
    }
    
    function localLogout() {
        currentUser = null;
        saveLocalData();
    }
    
    // ============= UNIFIED API =============
    async function login(username, password) {
        if (useServer) {
            const success = await serverLogin(username, password);
            if (success) return true;
        }
        return localLogin(username, password);
    }
    
    async function register(username, password) {
        if (useServer) {
            const success = await serverRegister(username, password);
            if (success) return true;
        }
        return localRegister(username, password);
    }
    
    async function getPosts() {
        if (useServer) {
            const serverPosts = await serverGetPosts();
            if (serverPosts) return serverPosts;
        }
        return localGetPosts();
    }
    
    async function createPost(title, content) {
        if (useServer) {
            const result = await serverCreatePost(title, content);
            if (result) return result;
        }
        return localCreatePost(title, content);
    }
    
    async function updatePost(id, title, content) {
        if (useServer) {
            const result = await serverUpdatePost(id, title, content);
            if (result) return result;
        }
        return localUpdatePost(id, title, content);
    }
    
    async function deletePost(id) {
        if (useServer) {
            const result = await serverDeletePost(id);
            if (result) return result;
        }
        return localDeletePost(id);
    }
    
    async function getMessages() {
        if (useServer) {
            const serverMessages = await serverGetMessages();
            if (serverMessages) return serverMessages;
        }
        return localGetMessages();
    }
    
    async function sendMessage(text) {
        if (useServer) {
            const result = await serverSendMessage(text);
            if (result) return result;
        }
        return localSendMessage(text);
    }
    
    function logout() {
        if (useServer) {
            token = null;
            localStorage.removeItem('server_token');
            localStorage.removeItem('server_user');
        }
        localLogout();
    }
    
    // ============= UI RENDERING =============
    let currentPosts = [];
    let currentMessages = [];
    
    async function loadAllData() {
        if (useServer && localStorage.getItem('server_token')) {
            token = localStorage.getItem('server_token');
            const savedUser = localStorage.getItem('server_user');
            if (savedUser) currentUser = JSON.parse(savedUser);
        }
        
        currentPosts = await getPosts();
        currentMessages = await getMessages();
    }
    
    async function renderUI() {
        renderAuthButtons();
        await renderPosts();
        await renderMessages();
        toggleAdminPanel();
        updateCounters();
    }
    
    function updateCounters() {
        const postCountSpan = document.getElementById("postCountBadge");
        if (postCountSpan) postCountSpan.innerText = `${currentPosts.length} post${currentPosts.length !== 1 ? 's' : ''}`;
        const msgCountSpan = document.getElementById("msgCountBadge");
        if (msgCountSpan) msgCountSpan.innerText = `${currentMessages.length} msg${currentMessages.length !== 1 ? 's' : ''}`;
    }
    
    function toggleAdminPanel() {
        const panel = document.getElementById("adminPanel");
        if (panel) {
            panel.style.display = (currentUser && currentUser.role === "admin") ? "block" : "none";
        }
    }
    
    function renderAuthButtons() {
        const authArea = document.getElementById("authArea");
        if (!authArea) return;
        
        if (currentUser) {
            authArea.innerHTML = `
                <div class="user-badge"><i class="fas fa-user-circle"></i> ${escapeHtml(currentUser.username)} (${currentUser.role === 'admin' ? 'Admin 👑' : 'User'})</div>
                <button id="logoutBtn" class="btn btn-outline btn-sm"><i class="fas fa-sign-out-alt"></i> Logout</button>
            `;
            document.getElementById("logoutBtn")?.addEventListener("click", async () => {
                logout();
                await loadAllData();
                await renderUI();
                showToast("Logged out successfully");
            });
        } else {
            authArea.innerHTML = `
                <button id="showLoginBtn" class="btn btn-primary btn-sm"><i class="fas fa-key"></i> Login</button>
                <button id="showRegisterBtn" class="btn btn-outline btn-sm"><i class="fas fa-user-plus"></i> Register</button>
            `;
            document.getElementById("showLoginBtn")?.addEventListener("click", showLoginModal);
            document.getElementById("showRegisterBtn")?.addEventListener("click", showRegisterModal);
        }
    }
    
    function showLoginModal() {
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.innerHTML = `
            <div class="modal-content">
                <h3>Login to CollabSphere</h3>
                <input type="text" id="loginUsername" placeholder="Username" style="width:100%">
                <input type="password" id="loginPassword" placeholder="Password" style="width:100%">
                <div class="modal-buttons">
                    <button id="closeLoginModal" class="btn btn-outline btn-sm">Cancel</button>
                    <button id="submitLoginBtn" class="btn btn-primary btn-sm">Login</button>
                </div>
                <div class="demo-info">
                    <i class="fas fa-info-circle"></i> Demo: <strong>admin / admin123</strong> | <strong>alex_user / user123</strong>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        
        const closeModal = () => modal.remove();
        document.getElementById("closeLoginModal")?.addEventListener("click", closeModal);
        document.getElementById("submitLoginBtn")?.addEventListener("click", async () => {
            const username = document.getElementById("loginUsername")?.value.trim();
            const pwd = document.getElementById("loginPassword")?.value.trim();
            const success = await login(username, pwd);
            if (success) {
                await loadAllData();
                await renderUI();
                closeModal();
                showToast(`Welcome ${username}!`);
            } else {
                alert("Invalid credentials");
            }
        });
    }
    
    function showRegisterModal() {
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.innerHTML = `
            <div class="modal-content">
                <h3>Register new user</h3>
                <input type="text" id="regUsername" placeholder="Username" style="width:100%">
                <input type="password" id="regPassword" placeholder="Password" style="width:100%">
                <div class="modal-buttons">
                    <button id="closeRegModal" class="btn btn-outline btn-sm">Cancel</button>
                    <button id="submitRegBtn" class="btn btn-primary btn-sm">Sign up</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        
        const closeModal = () => modal.remove();
        document.getElementById("closeRegModal")?.addEventListener("click", closeModal);
        document.getElementById("submitRegBtn")?.addEventListener("click", async () => {
            const username = document.getElementById("regUsername")?.value.trim();
            const pwd = document.getElementById("regPassword")?.value.trim();
            if (!username || !pwd) {
                alert("Username and password required");
                return;
            }
            const success = await register(username, pwd);
            if (success) {
                await loadAllData();
                await renderUI();
                closeModal();
                showToast(`Account created! Logged in as ${username}`);
            } else {
                alert("Username already exists");
            }
        });
    }
    
    async function renderPosts() {
        const container = document.getElementById("postsContainer");
        if (!container) return;
        
        if (!currentUser) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-lock"></i> Please login to view posts</div>`;
            return;
        }
        
        if (currentPosts.length === 0) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-newspaper"></i> No posts available</div>`;
            return;
        }
        
        const isAdmin = currentUser && currentUser.role === "admin";
        container.innerHTML = currentPosts.map(post => `
            <div class="post-card">
                <div class="post-title">${escapeHtml(post.title)}</div>
                <div class="post-content">${escapeHtml(post.content)}</div>
                <div class="post-meta">
                    <span><i class="far fa-calendar-alt"></i> ${new Date(post.createdAt || post.created_at).toLocaleString()}</span>
                    ${isAdmin ? `
                        <div class="admin-actions">
                            <button class="editPostBtn btn btn-warning btn-sm" data-id="${post.id}"><i class="fas fa-edit"></i> Edit</button>
                            <button class="deletePostBtn btn btn-danger btn-sm" data-id="${post.id}"><i class="fas fa-trash"></i> Del</button>
                        </div>
                    ` : ''}
                </div>
            </div>
        `).join('');
        
        if (isAdmin) {
            document.querySelectorAll('.editPostBtn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const id = btn.getAttribute('data-id');
                    const post = currentPosts.find(p => p.id === id);
                    if (post) editPostModal(post);
                });
            });
            document.querySelectorAll('.deletePostBtn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const id = btn.getAttribute('data-id');
                    if (confirm("Delete this post permanently?")) {
                        await deletePost(id);
                        await loadAllData();
                        await renderUI();
                        showToast("Post deleted");
                    }
                });
            });
        }
    }
    
    async function editPostModal(post) {
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.innerHTML = `
            <div class="modal-content" style="max-width:500px;">
                <h3>Edit Post</h3>
                <input type="text" id="editTitle" value="${escapeHtml(post.title)}" placeholder="Title" style="width:100%">
                <textarea id="editContent" rows="3" placeholder="Content" style="width:100%">${escapeHtml(post.content)}</textarea>
                <div class="modal-buttons">
                    <button id="cancelEditBtn" class="btn btn-outline">Cancel</button>
                    <button id="saveEditBtn" class="btn btn-primary">Update</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        const close = () => modal.remove();
        document.getElementById("cancelEditBtn")?.addEventListener("click", close);
        document.getElementById("saveEditBtn")?.addEventListener("click", async () => {
            const newTitle = document.getElementById("editTitle").value.trim();
            const newContent = document.getElementById("editContent").value.trim();
            if (newTitle && newContent) {
                await updatePost(post.id, newTitle, newContent);
                await loadAllData();
                await renderUI();
                close();
                showToast("Post updated");
            } else alert("Title and content required");
        });
    }
    
    async function renderMessages() {
        const container = document.getElementById("messagesContainer");
        if (!container) return;
        
        if (!currentUser) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-lock"></i> Please login to view messages</div>`;
            return;
        }
        
        if (currentMessages.length === 0) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-inbox"></i> No messages yet</div>`;
            return;
        }
        
        container.innerHTML = currentMessages.map(msg => `
            <div class="message-card">
                <div class="message-sender"><i class="fas fa-user"></i> ${escapeHtml(msg.username)}</div>
                <div class="message-text">${escapeHtml(msg.text)}</div>
                <div class="message-time"><i class="far fa-clock"></i> ${new Date(msg.timestamp || msg.timestamp).toLocaleString()}</div>
            </div>
        `).join('');
    }
    
    async function handleSendMessage() {
        const input = document.getElementById("messageInput");
        const text = input.value.trim();
        
        if (!currentUser) {
            showToast("Please login to send message");
            return;
        }
        if (!text) return;
        
        await sendMessage(text);
        await loadAllData();
        await renderMessages();
        input.value = "";
        showToast("Message sent" + (useServer ? " to server!" : " to local storage!"));
    }
    
    async function handleCreatePost() {
        const title = document.getElementById("postTitle").value.trim();
        const content = document.getElementById("postContent").value.trim();
        
        if (!currentUser || currentUser.role !== "admin") {
            showToast("Only admin can create posts!");
            return;
        }
        if (!title || !content) {
            alert("Title and content required");
            return;
        }
        
        await createPost(title, content);
        await loadAllData();
        await renderUI();
        document.getElementById("postTitle").value = "";
        document.getElementById("postContent").value = "";
        showToast("✅ Post published!");
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function showToast(msg, color = '#333') {
        let toast = document.querySelector(".toast");
        if (toast) toast.remove();
        const div = document.createElement("div");
        div.className = "toast";
        div.style.background = color;
        div.innerHTML = `<i class="fas fa-bell"></i> ${msg}`;
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 3000);
    }
    
    function bindEvents() {
        const createBtn = document.getElementById("createPostBtn");
        if (createBtn) {
            const newBtn = createBtn.cloneNode(true);
            createBtn.parentNode.replaceChild(newBtn, createBtn);
            newBtn.addEventListener("click", handleCreatePost);
        }
        
        const sendMsgBtn = document.getElementById("sendMessageBtn");
        if (sendMsgBtn) {
            const newSendBtn = sendMsgBtn.cloneNode(true);
            sendMsgBtn.parentNode.replaceChild(newSendBtn, sendMsgBtn);
            newSendBtn.addEventListener("click", handleSendMessage);
        }
        
        const msgInput = document.getElementById("messageInput");
        if (msgInput) {
            msgInput.addEventListener("keypress", (e) => {
                if (e.key === "Enter") handleSendMessage();
            });
        }
    }
    
    // ============= INITIALIZE =============
    async function init() {
        loadLocalData();
        await checkServerConnection();
        await loadAllData();
        await renderUI();
        bindEvents();
        showToast(useServer ? "🚀 Connected to server!" : "📀 Using local storage mode");
    }
    
    init();
</script>
</body>
</html>
