<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CollabSphere | Server Mode Only</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem;
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .navbar {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 1rem;
            padding: 1rem 2rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo i {
            color: #667eea;
            margin-right: 8px;
        }

        .server-badge {
            font-size: 0.7rem;
            background: #10b981;
            color: white;
            padding: 3px 8px;
            border-radius: 20px;
            margin-left: 10px;
        }

        .auth-buttons {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .user-badge {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 0.5rem 1.2rem;
            border-radius: 0.5rem;
            font-weight: 500;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn {
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 0.5rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid #667eea;
            color: #667eea;
        }

        .btn-outline:hover {
            background: #667eea;
            color: white;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .btn-warning {
            background: #f59e0b;
            color: white;
        }

        .btn-warning:hover {
            background: #d97706;
        }

        .btn-sm {
            padding: 0.3rem 0.8rem;
            font-size: 0.8rem;
        }

        .btn-success {
            background: #10b981;
            color: white;
        }

        .btn-success:hover {
            background: #059669;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 0.9fr;
            gap: 2rem;
        }

        .posts-section, .messages-section {
            background: white;
            border-radius: 1rem;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .section-header {
            background: #f3f4f6;
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e5e7eb;
        }

        .section-header h2 {
            font-size: 1.2rem;
            color: #333;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .badge {
            background: #667eea;
            color: white;
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .posts-container, .messages-container {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-height: 60vh;
            overflow-y: auto;
        }

        .post-card {
            background: #f9fafb;
            border-radius: 0.5rem;
            padding: 1rem;
            transition: all 0.2s;
            border: 1px solid #e5e7eb;
        }

        .post-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .post-title {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            color: #333;
        }

        .post-content {
            color: #6b7280;
            margin-bottom: 0.8rem;
            line-height: 1.4;
        }

        .post-meta {
            font-size: 0.7rem;
            color: #9ca3af;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .admin-actions {
            display: flex;
            gap: 0.5rem;
        }

        .message-card {
            background: #fef3c7;
            border-left: 3px solid #f59e0b;
            padding: 0.8rem;
            border-radius: 0.5rem;
        }

        .message-sender {
            font-weight: 700;
            color: #92400e;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 0.3rem;
        }

        .message-text {
            color: #78350f;
            margin: 0.3rem 0;
        }

        .message-time {
            font-size: 0.65rem;
            color: #b45309;
        }

        .admin-panel {
            background: white;
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            border-left: 4px solid #f59e0b;
        }

        .admin-panel h3 {
            color: #333;
            margin-bottom: 1rem;
            font-size: 1.1rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        input, textarea {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #e5e7eb;
            border-radius: 0.5rem;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .message-form {
            padding: 1rem;
            background: #f9fafb;
            border-top: 1px solid #e5e7eb;
            display: flex;
            gap: 0.8rem;
            align-items: center;
        }

        .message-form input {
            flex: 1;
            margin: 0;
        }

        .empty-state, .loading-state {
            text-align: center;
            padding: 2rem;
            color: #9ca3af;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 0.85rem;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal-content {
            background: white;
            border-radius: 1rem;
            padding: 2rem;
            max-width: 400px;
            width: 90%;
            animation: modalSlideIn 0.3s ease;
        }

        @keyframes modalSlideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-content h3 {
            margin-bottom: 1rem;
            color: #333;
        }

        .modal-content input {
            margin-bottom: 1rem;
        }

        .modal-buttons {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            margin-top: 1rem;
        }

        .demo-info {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #e5e7eb;
            font-size: 0.8rem;
            color: #6b7280;
            text-align: center;
        }

        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }
            .dashboard-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
            .navbar {
                flex-direction: column;
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="navbar">
        <div class="logo">
            <i class="fas fa-cloud-upload-alt"></i> CollabSphere 
            <span id="connectionBadge" class="server-badge"><i class="fas fa-spinner fa-pulse"></i> Connecting...</span>
        </div>
        <div class="auth-buttons" id="authArea">
            <div class="loading-state" style="padding: 0;">Connecting to server...</div>
        </div>
    </div>

    <div id="adminPanel" class="admin-panel" style="display: none;">
        <h3><i class="fas fa-pen-alt"></i> Admin Panel - Create Post</h3>
        <div class="form-group">
            <input type="text" id="postTitle" placeholder="Post title" autocomplete="off">
        </div>
        <div class="form-group">
            <textarea id="postContent" rows="3" placeholder="Post content..."></textarea>
        </div>
        <button id="createPostBtn" class="btn btn-success"><i class="fas fa-plus-circle"></i> Publish Post</button>
    </div>

    <div class="dashboard-grid">
        <div class="posts-section">
            <div class="section-header">
                <h2><i class="fas fa-newspaper"></i> Official Posts</h2>
                <span id="postCountBadge" class="badge">0 posts</span>
            </div>
            <div id="postsContainer" class="posts-container">
                <div class="loading-state"><i class="fas fa-spinner fa-pulse"></i> Loading posts...</div>
            </div>
        </div>

        <div class="messages-section">
            <div class="section-header">
                <h2><i class="fas fa-envelope"></i> Messages to Admin</h2>
                <span id="msgCountBadge" class="badge">0 msgs</span>
            </div>
            <div id="messagesContainer" class="messages-container">
                <div class="loading-state"><i class="fas fa-spinner fa-pulse"></i> Loading messages...</div>
            </div>
            <div class="message-form">
                <input type="text" id="messageInput" placeholder="Type your message to admin..." autocomplete="off">
                <button id="sendMessageBtn" class="btn btn-primary"><i class="fas fa-paper-plane"></i> Send</button>
            </div>
        </div>
    </div>
</div>

<script>
    // ============= SERVER CONFIGURATION =============
    const SERVER_URL = 'http://localhost:3000/api';
    let token = null;
    let currentUser = null;
    let serverConnected = false;
    
    // Data stores
    let posts = [];
    let messages = [];
    
    // ============= CHECK SERVER CONNECTION =============
    async function checkServerConnection() {
        const badge = document.getElementById('connectionBadge');
        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 5000);
            const response = await fetch(`${SERVER_URL}/posts`, {
                signal: controller.signal,
                headers: { 'Content-Type': 'application/json' }
            });
            clearTimeout(timeoutId);
            
            if (response.ok) {
                serverConnected = true;
                badge.innerHTML = '<i class="fas fa-server"></i> Server Connected';
                badge.style.background = '#10b981';
                showToast('✅ Connected to server', '#10b981');
                return true;
            }
        } catch (error) {
            console.log('Server connection failed:', error);
        }
        
        serverConnected = false;
        badge.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Server Offline';
        badge.style.background = '#ef4444';
        showToast('❌ Cannot connect to server. Please start the server at http://localhost:3000', '#ef4444');
        return false;
    }
    
    // ============= API CALLS =============
    async function apiCall(endpoint, options = {}) {
        if (!serverConnected) {
            throw new Error('Server not connected');
        }
        
        const headers = {
            'Content-Type': 'application/json',
            ...options.headers
        };
        
        if (token) {
            headers['Authorization'] = `Bearer ${token}`;
        }
        
        const response = await fetch(`${SERVER_URL}${endpoint}`, {
            ...options,
            headers
        });
        
        if (!response.ok) {
            const error = await response.json();
            throw new Error(error.error || 'API Error');
        }
        
        return await response.json();
    }
    
    // ============= AUTH FUNCTIONS =============
    async function login(username, password) {
        const data = await apiCall('/login', {
            method: 'POST',
            body: JSON.stringify({ username, password })
        });
        token = data.token;
        currentUser = data.user;
        localStorage.setItem('server_token', token);
        localStorage.setItem('server_user', JSON.stringify(currentUser));
        return true;
    }
    
    async function register(username, password) {
        const data = await apiCall('/register', {
            method: 'POST',
            body: JSON.stringify({ username, password })
        });
        token = data.token;
        currentUser = data.user;
        localStorage.setItem('server_token', token);
        localStorage.setItem('server_user', JSON.stringify(currentUser));
        return true;
    }
    
    function logout() {
        token = null;
        currentUser = null;
        localStorage.removeItem('server_token');
        localStorage.removeItem('server_user');
    }
    
    // ============= POSTS FUNCTIONS =============
    async function getPosts() {
        return await apiCall('/posts');
    }
    
    async function createPost(title, content) {
        return await apiCall('/posts', {
            method: 'POST',
            body: JSON.stringify({ title, content })
        });
    }
    
    async function updatePost(id, title, content) {
        return await apiCall(`/posts/${id}`, {
            method: 'PUT',
            body: JSON.stringify({ title, content })
        });
    }
    
    async function deletePost(id) {
        return await apiCall(`/posts/${id}`, { method: 'DELETE' });
    }
    
    // ============= MESSAGES FUNCTIONS =============
    async function getMessages() {
        return await apiCall('/messages');
    }
    
    async function sendMessage(text) {
        return await apiCall('/messages', {
            method: 'POST',
            body: JSON.stringify({ text })
        });
    }
    
    // ============= UI RENDERING =============
    async function loadAllData() {
        if (!serverConnected || !currentUser) return;
        
        try {
            posts = await getPosts();
            messages = await getMessages();
        } catch (error) {
            console.error('Error loading data:', error);
            showToast('Error loading data: ' + error.message, '#ef4444');
        }
    }
    
    async function renderUI() {
        renderAuthButtons();
        await renderPosts();
        await renderMessages();
        toggleAdminPanel();
        updateCounters();
    }
    
    function updateCounters() {
        const postCountSpan = document.getElementById("postCountBadge");
        if (postCountSpan) postCountSpan.innerText = `${posts.length} post${posts.length !== 1 ? 's' : ''}`;
        const msgCountSpan = document.getElementById("msgCountBadge");
        if (msgCountSpan) msgCountSpan.innerText = `${messages.length} msg${messages.length !== 1 ? 's' : ''}`;
    }
    
    function toggleAdminPanel() {
        const panel = document.getElementById("adminPanel");
        if (panel) {
            panel.style.display = (currentUser && currentUser.role === "admin") ? "block" : "none";
        }
    }
    
    function renderAuthButtons() {
        const authArea = document.getElementById("authArea");
        if (!authArea) return;
        
        if (currentUser) {
            authArea.innerHTML = `
                <div class="user-badge"><i class="fas fa-user-circle"></i> ${escapeHtml(currentUser.username)} (${currentUser.role === 'admin' ? 'Admin 👑' : 'User'})</div>
                <button id="logoutBtn" class="btn btn-outline btn-sm"><i class="fas fa-sign-out-alt"></i> Logout</button>
            `;
            document.getElementById("logoutBtn")?.addEventListener("click", async () => {
                logout();
                await renderUI();
                showToast("Logged out successfully");
            });
        } else {
            authArea.innerHTML = `
                <button id="showLoginBtn" class="btn btn-primary btn-sm"><i class="fas fa-key"></i> Login</button>
                <button id="showRegisterBtn" class="btn btn-outline btn-sm"><i class="fas fa-user-plus"></i> Register</button>
            `;
            document.getElementById("showLoginBtn")?.addEventListener("click", showLoginModal);
            document.getElementById("showRegisterBtn")?.addEventListener("click", showRegisterModal);
        }
    }
    
    function showLoginModal() {
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.innerHTML = `
            <div class="modal-content">
                <h3>Login to CollabSphere</h3>
                <input type="text" id="loginUsername" placeholder="Username" style="width:100%">
                <input type="password" id="loginPassword" placeholder="Password" style="width:100%">
                <div class="modal-buttons">
                    <button id="closeLoginModal" class="btn btn-outline btn-sm">Cancel</button>
                    <button id="submitLoginBtn" class="btn btn-primary btn-sm">Login</button>
                </div>
                <div class="demo-info">
                    <i class="fas fa-info-circle"></i> Demo: <strong>admin / admin123</strong> | <strong>alex_user / user123</strong>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        
        const closeModal = () => modal.remove();
        document.getElementById("closeLoginModal")?.addEventListener("click", closeModal);
        document.getElementById("submitLoginBtn")?.addEventListener("click", async () => {
            const username = document.getElementById("loginUsername")?.value.trim();
            const pwd = document.getElementById("loginPassword")?.value.trim();
            
            if (!username || !pwd) {
                alert("Please enter username and password");
                return;
            }
            
            try {
                await login(username, pwd);
                await loadAllData();
                await renderUI();
                closeModal();
                showToast(`Welcome ${username}!`);
            } catch (error) {
                alert("Login failed: " + error.message);
            }
        });
    }
    
    function showRegisterModal() {
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.innerHTML = `
            <div class="modal-content">
                <h3>Register new user</h3>
                <input type="text" id="regUsername" placeholder="Username" style="width:100%">
                <input type="password" id="regPassword" placeholder="Password" style="width:100%">
                <div class="modal-buttons">
                    <button id="closeRegModal" class="btn btn-outline btn-sm">Cancel</button>
                    <button id="submitRegBtn" class="btn btn-primary btn-sm">Sign up</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        
        const closeModal = () => modal.remove();
        document.getElementById("closeRegModal")?.addEventListener("click", closeModal);
        document.getElementById("submitRegBtn")?.addEventListener("click", async () => {
            const username = document.getElementById("regUsername")?.value.trim();
            const pwd = document.getElementById("regPassword")?.value.trim();
            
            if (!username || !pwd) {
                alert("Username and password required");
                return;
            }
            
            try {
                await register(username, pwd);
                await loadAllData();
                await renderUI();
                closeModal();
                showToast(`Account created! Logged in as ${username}`);
            } catch (error) {
                alert("Registration failed: " + error.message);
            }
        });
    }
    
    async function renderPosts() {
        const container = document.getElementById("postsContainer");
        if (!container) return;
        
        if (!currentUser) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-lock"></i> Please login to view posts</div>`;
            return;
        }
        
        if (posts.length === 0) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-newspaper"></i> No posts available</div>`;
            return;
        }
        
        const isAdmin = currentUser && currentUser.role === "admin";
        container.innerHTML = posts.map(post => `
            <div class="post-card">
                <div class="post-title">${escapeHtml(post.title)}</div>
                <div class="post-content">${escapeHtml(post.content)}</div>
                <div class="post-meta">
                    <span><i class="far fa-calendar-alt"></i> ${new Date(post.created_at).toLocaleString()}</span>
                    ${isAdmin ? `
                        <div class="admin-actions">
                            <button class="editPostBtn btn btn-warning btn-sm" data-id="${post.id}"><i class="fas fa-edit"></i> Edit</button>
                            <button class="deletePostBtn btn btn-danger btn-sm" data-id="${post.id}"><i class="fas fa-trash"></i> Del</button>
                        </div>
                    ` : ''}
                </div>
            </div>
        `).join('');
        
        if (isAdmin) {
            document.querySelectorAll('.editPostBtn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const id = btn.getAttribute('data-id');
                    const post = posts.find(p => p.id === id);
                    if (post) editPostModal(post);
                });
            });
            document.querySelectorAll('.deletePostBtn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const id = btn.getAttribute('data-id');
                    if (confirm("Delete this post permanently?")) {
                        try {
                            await deletePost(id);
                            await loadAllData();
                            await renderUI();
                            showToast("Post deleted");
                        } catch (error) {
                            alert("Error deleting post: " + error.message);
                        }
                    }
                });
            });
        }
    }
    
    async function editPostModal(post) {
        const modal = document.createElement('div');
        modal.className = 'modal-overlay';
        modal.innerHTML = `
            <div class="modal-content" style="max-width:500px;">
                <h3>Edit Post</h3>
                <input type="text" id="editTitle" value="${escapeHtml(post.title)}" placeholder="Title" style="width:100%">
                <textarea id="editContent" rows="3" placeholder="Content" style="width:100%">${escapeHtml(post.content)}</textarea>
                <div class="modal-buttons">
                    <button id="cancelEditBtn" class="btn btn-outline">Cancel</button>
                    <button id="saveEditBtn" class="btn btn-primary">Update</button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        const close = () => modal.remove();
        document.getElementById("cancelEditBtn")?.addEventListener("click", close);
        document.getElementById("saveEditBtn")?.addEventListener("click", async () => {
            const newTitle = document.getElementById("editTitle").value.trim();
            const newContent = document.getElementById("editContent").value.trim();
            if (newTitle && newContent) {
                try {
                    await updatePost(post.id, newTitle, newContent);
                    await loadAllData();
                    await renderUI();
                    close();
                    showToast("Post updated");
                } catch (error) {
                    alert("Error updating post: " + error.message);
                }
            } else alert("Title and content required");
        });
    }
    
    async function renderMessages() {
        const container = document.getElementById("messagesContainer");
        if (!container) return;
        
        if (!currentUser) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-lock"></i> Please login to view messages</div>`;
            return;
        }
        
        if (messages.length === 0) {
            container.innerHTML = `<div class="empty-state"><i class="fas fa-inbox"></i> No messages yet</div>`;
            return;
        }
        
        container.innerHTML = messages.map(msg => `
            <div class="message-card">
                <div class="message-sender"><i class="fas fa-user"></i> ${escapeHtml(msg.username)}</div>
                <div class="message-text">${escapeHtml(msg.text)}</div>
                <div class="message-time"><i class="far fa-clock"></i> ${new Date(msg.timestamp).toLocaleString()}</div>
            </div>
        `).join('');
    }
    
    async function handleSendMessage() {
        const input = document.getElementById("messageInput");
        const text = input.value.trim();
        
        if (!currentUser) {
            showToast("Please login to send message");
            return;
        }
        if (!text) return;
        
        try {
            await sendMessage(text);
            await loadAllData();
            await renderMessages();
            input.value = "";
            showToast("Message sent to server!");
        } catch (error) {
            alert("Error sending message: " + error.message);
        }
    }
    
    async function handleCreatePost() {
        const title = document.getElementById("postTitle").value.trim();
        const content = document.getElementById("postContent").value.trim();
        
        if (!currentUser || currentUser.role !== "admin") {
            showToast("Only admin can create posts!");
            return;
        }
        if (!title || !content) {
            alert("Title and content required");
            return;
        }
        
        try {
            await createPost(title, content);
            await loadAllData();
            await renderUI();
            document.getElementById("postTitle").value = "";
            document.getElementById("postContent").value = "";
            showToast("✅ Post published!");
        } catch (error) {
            alert("Error creating post: " + error.message);
        }
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function showToast(msg, color = '#333') {
        let toast = document.querySelector(".toast");
        if (toast) toast.remove();
        const div = document.createElement("div");
        div.className = "toast";
        div.style.background = color;
        div.innerHTML = `<i class="fas fa-bell"></i> ${msg}`;
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 3000);
    }
    
    function bindEvents() {
        const createBtn = document.getElementById("createPostBtn");
        if (createBtn) {
            const newBtn = createBtn.cloneNode(true);
            createBtn.parentNode.replaceChild(newBtn, createBtn);
            newBtn.addEventListener("click", handleCreatePost);
        }
        
        const sendMsgBtn = document.getElementById("sendMessageBtn");
        if (sendMsgBtn) {
            const newSendBtn = sendMsgBtn.cloneNode(true);
            sendMsgBtn.parentNode.replaceChild(newSendBtn, sendMsgBtn);
            newSendBtn.addEventListener("click", handleSendMessage);
        }
        
        const msgInput = document.getElementById("messageInput");
        if (msgInput) {
            msgInput.addEventListener("keypress", (e) => {
                if (e.key === "Enter") handleSendMessage();
            });
        }
    }
    
    // ============= INITIALIZE =============
    async function init() {
        // Check for saved token
        const savedToken = localStorage.getItem('server_token');
        const savedUser = localStorage.getItem('server_user');
        if (savedToken && savedUser) {
            token = savedToken;
            currentUser = JSON.parse(savedUser);
        }
        
        const connected = await checkServerConnection();
        if (connected) {
            if (currentUser) {
                await loadAllData();
            }
            await renderUI();
            bindEvents();
        } else {
            // Show error and disable functionality
            const authArea = document.getElementById("authArea");
            if (authArea) {
                authArea.innerHTML = `<div style="color: red; padding: 10px; background: #fee; border-radius: 8px;">
                    <i class="fas fa-exclamation-triangle"></i> Server not running!<br>
                    Please start the server with: <strong>node server.js</strong>
                </div>`;
            }
        }
    }
    
    init();
</script>
</body>
</html>
